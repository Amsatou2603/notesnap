<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="description" content="NoteSnap — Vos notes avec photos, toujours disponibles. Application offline-first." />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />

    <meta property="og:description" content="Vos notes avec photos, toujours disponibles" />
    <meta property="og:image" content="/icon-512.png" />

    <meta name="twitter:description" content="Vos notes avec photos, toujours disponibles" />

    <!-- Google Fonts : Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    />
